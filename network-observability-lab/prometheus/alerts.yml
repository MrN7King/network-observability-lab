groups:
  - name: network_reachability
    rules:

      - alert: NodeUnreachable
        expr: probe_success{job="icmp-probes"} == 0
        for: 20s
        labels:
          severity: critical
          team: noc
        annotations:
          summary: "NODE DOWN: {{ $labels.node }}"
          description: "ICMP probe to {{ $labels.instance }} has been failing for 20s. Immediate investigation required."

      - alert: WebServerDown
        expr: probe_success{job="http-probes"} == 0
        for: 15s
        labels:
          severity: critical
          team: noc
        annotations:
          summary: "WEB SERVER DOWN: {{ $labels.node }}"
          description: "HTTP probe to {{ $labels.instance }} is failing. The DMZ web server may be unreachable."

      - alert: HighLatency
        expr: probe_duration_seconds{job="icmp-probes"} * 1000 > 100
        for: 30s
        labels:
          severity: warning
          team: noc
        annotations:
          summary: "High latency on {{ $labels.node }}"
          description: "RTT to {{ $labels.node }} is {{ $value | printf \"%.1f\" }}ms (threshold: 100ms)."

      - alert: ExporterDown
        expr: up{job="node-exporters"} == 0
        for: 15s
        labels:
          severity: warning
          team: noc
        annotations:
          summary: "Exporter down: {{ $labels.instance }}"
          description: "node_exporter on {{ $labels.instance }} is not responding."

      - alert: HighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 85
        for: 1m
        labels:
          severity: warning
          team: noc
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU has been above 85% for 1 minute on {{ $labels.instance }}."

      - alert: HighRxTraffic
        expr: rate(node_network_receive_bytes_total[1m]) > 52428800
        for: 30s
        labels:
          severity: warning
          team: noc
        annotations:
          summary: "High RX traffic: {{ $labels.instance }} / {{ $labels.device }}"
          description: "Interface {{ $labels.device }} on {{ $labels.instance }} receiving over 50 MB/s."
