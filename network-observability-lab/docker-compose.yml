# ============================================================
#  Network Observability Lab  v2  —  Windows Docker Desktop
#  Nodes:      core-router, edge-a, edge-b, dmz-host, web-dmz
#  Monitoring: Prometheus, Grafana, Blackbox, Node Exporters
#  Alerting:   Alertmanager
#  Logging:    Loki + Promtail
# ============================================================

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.99.0.0/24

services:

  # ── Simulated Network Nodes ─────────────────────────────────

  core-router:
    image: alpine:3.19
    container_name: core-router
    hostname: core-router
    networks:
      lab_net:
        ipv4_address: 172.20.0.10
      mgmt_net:
        ipv4_address: 172.99.0.10
    command: >
      sh -c "apk add --no-cache iproute2 iputils curl &&
             tail -f /dev/null"
    restart: unless-stopped

  edge-a:
    image: alpine:3.19
    container_name: edge-a
    hostname: edge-a
    networks:
      lab_net:
        ipv4_address: 172.20.0.21
      mgmt_net:
        ipv4_address: 172.99.0.21
    command: >
      sh -c "apk add --no-cache iproute2 iputils curl &&
             tail -f /dev/null"
    restart: unless-stopped

  edge-b:
    image: alpine:3.19
    container_name: edge-b
    hostname: edge-b
    networks:
      lab_net:
        ipv4_address: 172.20.0.22
      mgmt_net:
        ipv4_address: 172.99.0.22
    command: >
      sh -c "apk add --no-cache iproute2 iputils curl &&
             tail -f /dev/null"
    restart: unless-stopped

  dmz-host:
    image: alpine:3.19
    container_name: dmz-host
    hostname: dmz-host
    networks:
      lab_net:
        ipv4_address: 172.20.0.23
      mgmt_net:
        ipv4_address: 172.99.0.23
    command: >
      sh -c "apk add --no-cache iproute2 iputils curl &&
             tail -f /dev/null"
    restart: unless-stopped

  # ── nginx web server in the DMZ ────────────────────────────
  web-dmz:
    image: nginx:alpine
    container_name: web-dmz
    hostname: web-dmz
    networks:
      lab_net:
        ipv4_address: 172.20.0.30
      mgmt_net:
        ipv4_address: 172.99.0.30
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    restart: unless-stopped

  # ── Node Exporters ──────────────────────────────────────────

  exporter-core:
    image: prom/node-exporter:v1.8.1
    container_name: exporter-core
    hostname: exporter-core
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.110
    depends_on: [core-router]
    command:
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.netdev"
      - "--collector.uname"
    restart: unless-stopped

  exporter-edge-a:
    image: prom/node-exporter:v1.8.1
    container_name: exporter-edge-a
    hostname: exporter-edge-a
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.121
    depends_on: [edge-a]
    command:
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.netdev"
      - "--collector.uname"
    restart: unless-stopped

  exporter-edge-b:
    image: prom/node-exporter:v1.8.1
    container_name: exporter-edge-b
    hostname: exporter-edge-b
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.122
    depends_on: [edge-b]
    command:
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.netdev"
      - "--collector.uname"
    restart: unless-stopped

  exporter-dmz:
    image: prom/node-exporter:v1.8.1
    container_name: exporter-dmz
    hostname: exporter-dmz
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.123
    depends_on: [dmz-host]
    command:
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.netdev"
      - "--collector.uname"
    restart: unless-stopped

  # ── Blackbox Exporter ───────────────────────────────────────

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox
    hostname: blackbox
    networks:
      lab_net:
        ipv4_address: 172.20.0.200
      mgmt_net:
        ipv4_address: 172.99.0.200
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.9
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Alertmanager ────────────────────────────────────────────

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    hostname: alertmanager
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.8
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--cluster.listen-address="
    restart: unless-stopped

  # ── Loki ────────────────────────────────────────────────────

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    hostname: loki
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.7
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ── Promtail ────────────────────────────────────────────────

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    hostname: promtail
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.6
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    hostname: grafana
    networks:
      mgmt_net:
        ipv4_address: 172.99.0.3
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=netlab123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/noc-wallboard.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, loki]
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
