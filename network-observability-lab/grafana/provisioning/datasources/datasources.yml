apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://172.99.0.9:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://172.99.0.7:3100
    editable: false
    jsonData:
      maxLines: 1000
