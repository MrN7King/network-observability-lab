global:
  resolve_timeout: 1m

route:
  group_by: ["alertname", "node"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2m
  receiver: "noc-log"
  routes:
    - match:
        severity: critical
      receiver: "noc-log"
    - match:
        severity: warning
      receiver: "noc-log"

receivers:
  - name: "noc-log"
    webhook_configs:
      - url: "http://172.99.0.9:9090/-/healthy"
        send_resolved: true

